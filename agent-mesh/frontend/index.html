<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- Favicon -->
  <link rel="icon"             type="image/svg+xml" href="icon.svg" />
  <link rel="shortcut icon"    type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#080a0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AuraAgentic" />

  <!-- SEO / OG -->
  <meta name="description" content="Autonomous multi-agent task economy on Somnia Agentic L1. Post tasks, watch AI agents bid and execute, earn STT." />
  <meta property="og:title"       content="AuraAgentic — Autonomous Agent Economy on Somnia" />
  <meta property="og:description" content="Stake agents. Post tasks. Watch AI bid, execute and earn — all on-chain at 1M+ TPS." />
  <meta property="og:image"       content="icon.svg" />
  <meta property="og:type"        content="website" />
  <meta name="twitter:card"       content="summary_large_image" />
  <meta name="twitter:title"      content="AuraAgentic — Somnia Agentic L1" />
  <meta name="twitter:description" content="First autonomous AI agent economy on Somnia blockchain." />
  <meta name="twitter:image"      content="icon.svg" />

  <!-- Splash: inline critical styles so they render before CSS loads -->
  <style>
    #splash{position:fixed;inset:0;z-index:9999;background:#070910;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .65s ease,transform .65s ease}
    #splash.out{opacity:0;pointer-events:none}
    .sp-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.04) 1px,transparent 1px);background-size:48px 48px;animation:grid-drift 10s linear infinite}
    @keyframes grid-drift{to{background-position:48px 48px}}
    .sp-glow{position:absolute;width:640px;height:640px;background:radial-gradient(circle,rgba(108,99,255,.13) 0%,transparent 68%);border-radius:50%;animation:glow-pulse 3s ease-in-out infinite alternate}
    @keyframes glow-pulse{from{opacity:.5;transform:scale(.9)}to{opacity:1;transform:scale(1.1)}}
    .sp-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:20px}
    .sp-logo{width:110px;height:110px;position:relative;animation:logo-float 3s ease-in-out infinite alternate}
    @keyframes logo-float{from{transform:translateY(0)}to{transform:translateY(-10px)}}
    .sp-ring{position:absolute;inset:-18px;border-radius:50%;border:1.5px solid rgba(0,212,255,.25);animation:ring-spin 5s linear infinite}
    @keyframes ring-spin{to{transform:rotate(360deg)}}
    .sp-ring::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:10px;height:10px;background:#00d4ff;border-radius:50%;box-shadow:0 0 14px #00d4ff,0 0 28px #00d4ff}
    .sp-ring2{position:absolute;inset:-32px;border-radius:50%;border:1px solid rgba(124,58,237,.18);animation:ring-spin 9s linear infinite reverse}
    .sp-ring2::before{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:7px;height:7px;background:#9333ea;border-radius:50%;box-shadow:0 0 10px #9333ea}
    .sp-brand{font-family:'Oswald',system-ui,sans-serif;font-size:44px;font-weight:700;letter-spacing:7px;text-transform:uppercase;background:linear-gradient(135deg,#00d4ff 0%,#6c63ff 50%,#9333ea 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:brand-reveal 1s ease forwards}
    @keyframes brand-reveal{from{opacity:0;letter-spacing:22px}to{opacity:1;letter-spacing:7px}}
    .sp-tag{font-size:11px;color:rgba(100,116,139,.75);letter-spacing:3px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;animation:fade-up .9s ease .5s forwards;opacity:0}
    @keyframes fade-up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .sp-dots{display:flex;gap:9px;animation:fade-up .8s ease 1s forwards;opacity:0}
    .sp-dot{width:7px;height:7px;border-radius:50%;background:#6c63ff}
    .sp-dot:nth-child(1){animation:dot-b 1.3s ease 1.3s infinite}
    .sp-dot:nth-child(2){animation:dot-b 1.3s ease 1.55s infinite}
    .sp-dot:nth-child(3){animation:dot-b 1.3s ease 1.8s infinite}
    @keyframes dot-b{0%,60%,100%{transform:translateY(0);background:#6c63ff}30%{transform:translateY(-9px);background:#00d4ff}}
    .sp-powered{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(100,116,139,.4);font-family:'JetBrains Mono',monospace;letter-spacing:2.5px;white-space:nowrap;animation:fade-up 1s ease 1.6s forwards;opacity:0}
    .sp-version{position:absolute;bottom:28px;right:28px;font-size:9px;color:rgba(100,116,139,.3);font-family:'JetBrains Mono',monospace;letter-spacing:1px}
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════════
     SPLASH SCREEN — shown on every cold load, dismissed after 2.8 s
     ══════════════════════════════════════════════════════════════════ -->
<div id="splash">
  <div class="sp-grid"></div>
  <div class="sp-glow"></div>

  <div class="sp-inner">
    <!-- Animated logo with double orbit rings -->
    <div class="sp-logo">
      <div class="sp-ring"></div>
      <div class="sp-ring2"></div>
      <!-- Inline icon SVG for instant render (no network hop) -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="110" height="110">
        <defs>
          <linearGradient id="sp-g" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#00d4ff"/>
            <stop offset="55%"  stop-color="#6c63ff"/>
            <stop offset="100%" stop-color="#9333ea"/>
          </linearGradient>
          <filter id="sp-gf" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="10" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="sp-sf" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="20" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <rect width="512" height="512" rx="96" fill="#080a0f"/>
        <path d="M108 400 L256 96 L404 400"
              stroke="url(#sp-g)" stroke-width="40"
              stroke-linecap="round" stroke-linejoin="round"
              fill="none" filter="url(#sp-gf)"/>
        <line x1="172" y1="285" x2="340" y2="285"
              stroke="url(#sp-g)" stroke-width="32"
              stroke-linecap="round" filter="url(#sp-gf)"/>
        <path d="M292 80 A110 70 -30 0 1 420 185"
              stroke="#00d4ff" stroke-width="10"
              fill="none" opacity="0.6"
              stroke-linecap="round" filter="url(#sp-gf)"/>
        <circle cx="415" cy="175" r="36"
                fill="#00d4ff" opacity="0.95" filter="url(#sp-sf)"/>
        <circle cx="415" cy="175" r="20" fill="#fff" opacity="0.5"/>
        <circle cx="150" cy="350" r="18" fill="#9333ea" opacity="0.75" filter="url(#sp-gf)"/>
        <circle cx="362" cy="350" r="14" fill="#6c63ff" opacity="0.65" filter="url(#sp-gf)"/>
      </svg>
    </div>

    <div class="sp-brand">AuraAgentic</div>
    <div class="sp-tag">Autonomous Agent Economy</div>
    <div class="sp-dots">
      <div class="sp-dot"></div>
      <div class="sp-dot"></div>
      <div class="sp-dot"></div>
    </div>
  </div>

  <div class="sp-powered">POWERED BY SOMNIA AGENTIC L1 · &lt;1s FINALITY · 1M+ TPS</div>
  <div class="sp-version">AuraGuard v2.0</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.0/ethers.umd.min.js"></script>
<script src="app.js"></script>
<script>
  // ── Splash dismiss ──────────────────────────────────────────────────────────
  (function() {
    const SPLASH_MS = 2800;  // total splash duration
    const MIN_MS    = 1400;  // minimum brand-exposure before early dismiss
    // Use a LOCAL startedAt so slow-loading pages (high TTFB) don't skip the splash.
    // performance.now() counts from navigation-start; on slow connections it can
    // already be >1400 ms when this script runs, causing instant dismiss.
    const startedAt = Date.now();

    function dismissSplash() {
      const el = document.getElementById('splash');
      if (!el) return;
      el.classList.add('out');
      setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 700);
    }
    const timer = setTimeout(dismissSplash, SPLASH_MS);
    // Early dismiss only if fonts have been ready for at least MIN_MS since
    // this script block started (i.e. the user has actually seen the splash).
    document.fonts.ready.then(() => {
      const elapsed = Date.now() - startedAt;
      if (elapsed >= MIN_MS) { clearTimeout(timer); dismissSplash(); }
    });
  })();

  // ── Service Worker ──────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }

  // ── Scroll navigation ───────────────────────────────────────────────────────
  (function () {
    const topBtn  = document.getElementById('scroll-top-btn');
    const downBtn = document.getElementById('scroll-down-btn');
    if (!topBtn || !downBtn) return;

    // Determine the real scroll container at call-time.
    // #content has overflow-y:auto; fall back to window if it isn't scrollable.
    function getCtx() {
      const c = document.getElementById('content');
      if (c && c.scrollHeight > c.clientHeight + 5) {
        return { top: c.scrollTop, vis: c.clientHeight, total: c.scrollHeight, el: c };
      }
      return {
        top:   window.scrollY || document.documentElement.scrollTop,
        vis:   window.innerHeight,
        total: document.documentElement.scrollHeight,
        el:    null,
      };
    }

    function updateBtns() {
      const { top, vis, total } = getCtx();
      const nearBottom = (top + vis) >= (total - 100);
      // scroll-down: always show unless we're near the bottom
      downBtn.classList.toggle('visible', !nearBottom);
      // back-to-top: show once user has scrolled more than 80px
      topBtn.classList.toggle('visible', top > 80);
    }

    // Listen on both the panel and the window (covers all layout variants)
    const content = document.getElementById('content');
    if (content) {
      content.addEventListener('scroll', updateBtns, { passive: true });
      // Re-evaluate whenever app.js swaps in a new view
      new MutationObserver(() => setTimeout(updateBtns, 80)).observe(content, { childList: true });
    }
    window.addEventListener('scroll', updateBtns, { passive: true });

    // Click handlers
    topBtn.addEventListener('click', () => {
      const { el } = getCtx();
      (el || document.documentElement).scrollTo({ top: 0, behavior: 'smooth' });
      if (!el) window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    downBtn.addEventListener('click', () => {
      const { el, vis } = getCtx();
      if (el) el.scrollBy({ top: vis - 60, behavior: 'smooth' });
      else    window.scrollBy({ top: window.innerHeight - 60, behavior: 'smooth' });
    });

    // Poll at three points: right away, after first render, and after splash clears
    setTimeout(updateBtns, 200);
    setTimeout(updateBtns, 900);
    setTimeout(updateBtns, 3200);
  })();
</script>
